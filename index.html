<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abi Tech - Abe Samsung Tech</title>
    <style>
        :root {
            --primary: #0070f3;
            --dark: #111111;
            --light: #f8f9fa;
            --accent: #ff9900;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light);
            color: #333;
            line-height: 1.8;
        }
        header {
            background: linear-gradient(135deg, var(--dark), #222);
            color: white;
            text-align: center;
            padding: 50px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        header h1 {
            margin: 0;
            font-size: 2.8rem;
            color: var(--primary);
            letter-spacing: 1px;
        }
        header p {
            margin: 15px 0 0;
            font-size: 1.3rem;
            color: #bbb;
        }
        .container {
            max-width: 850px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border-top: 4px solid var(--primary);
            transition: transform 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card h2 {
            margin-top: 0;
            color: var(--dark);
            font-size: 1.6rem;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .card p {
            font-size: 1.1rem;
            color: #555;
        }
        .feature-list {
            margin: 15px 0;
            padding-left: 20px;
        }
        .feature-list li {
            margin-bottom: 10px;
            font-size: 1.05rem;
        }
        .btn-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 25px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 25px;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        .btn-tg { background: linear-gradient(135deg, #24A1DE, #0088cc); }
        .btn-tt { background: linear-gradient(135deg, #111, #333); }
        .btn-ph { background: linear-gradient(135deg, #25D366, #20ba5a); }
        footer {
            text-align: center;
            padding: 40px 20px;
            background-color: var(--dark);
            color: #888;
            margin-top: 60px;
            font-size: 1rem;
        }
        footer p { margin: 5px 0; }
        .highlight { color: var(--primary); font-weight: bold; }
        .badge {
            background-color: #ff3b30;
            color: white;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <header>
        <h1>💻 Abi Tech</h1>
        <p>የኢትዮጵያ እና የሌሎች አገሮች ምርጥ ምርጥ ሞባይል ሶፍትዌሮች እና የጥገና መፍትሔዎች ማከማቻ</p>
    </header>
