<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abe Tech - የሞባይል ሶፍትዌር እና ጥገና መፍትሔዎች</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e4e9f2;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .main-container {
            max-width: 600px;
            width: 100%;
            background-color: #ffffff;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            padding: 30px;
            text-align: center;
            box-sizing: border-box;
        }
        
        /* የኢትዮጵያ ባንዲራ */
        .flag-container {
            display: flex;
            justify-content: center;
            gap: 4px;
            margin-bottom: 5px;
        }
        .flag-stripe {
            width: 35px;
            height: 10px;
            border-radius: 2px;
        }
        .green { background-color: #009a44; }
        .yellow { background-color: #fcd116; }
        .red { background-color: #ce1126; }

        h1 {
            color: #0056b3;
            margin-top: 5px;
            margin-bottom: 20px;
            font-size: 2.2rem;
            border-bottom: 3px solid #0056b3;
            padding-bottom: 10px;
        }
        
        /* የባለቤቱ/የሶፍትዌር ባለሙያው ፎቶ */
        .owner-img {
            width: 100%;
            max-width: 450px;
            height: auto;
            border-radius: 20px;
            margin: 15px 0 25px 0;
            box-shadow: 0 8px 25px rgba(0,0,0,0.18);
            border: 3px solid #0056b3;
        }
        
        .section-box {
            background-color: #f8fafc;
            border-left: 5px solid #0056b3;
            padding: 20px;
            margin-bottom: 25px;
            border-radius: 0 16px 16px 0;
            text-align: left;
        }
        .section-box h2 {
            margin-top: 0;
            color: #1a1a1a;
            font-size: 1.3rem;
        }
        p {
            font-size: 16px;
            color: #444;
            line-height: 1.8;
            margin: 10px 0;
        }
        ul {
            padding-left: 20px;
            margin: 10px 0;
        }
        li {
            font-size: 15px;
            color: #333;
            margin-bottom: 8px;
            list-style-type: none;
        }
        .btn-container {
            margin-top: 25px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            margin-bottom: 12px;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.05rem;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        .btn-tg { background-color: #24A1DE; }
        .btn-tt { background-color: #000000; }
        .btn-ph { background-color: #25D366; }
        
        footer {
            margin-top: 30px;
            font-size: 14px;
            color: #777;
            font-weight: bold;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="flag-container">
            <div class="flag-stripe green"></div>
            <div class="flag-stripe yellow"></div>
            <div class="flag-stripe red"></div>
        </div>
        
        <h1>💻 Abe Tech 🇪🇹</h1>
        
        <img src="https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=600&q=80" alt="Abe Tech Founder" class="owner-img">
