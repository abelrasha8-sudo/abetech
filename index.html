<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abe Tech</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        
        /* ዋናው መያዣ ሳጥን */
        .main-container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        /* ሎጎ አቀማመጥ */
        .logo { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #0056b3; display: block; margin: 0 auto 20px auto; }
        
        h1 { text-align: center; color: #0056b3; }
        
        /* ጽሑፍ አቀማመጥ */
        .content { margin-top: 20px; line-height: 1.6; color: #333; display: block; }
        .content h2 { color: #0056b3; border-bottom: 2px solid #ddd; padding-bottom: 5px; }
        
        /* ፎቶ አቀማመጥ - ከታች ብቻ እንዲሆን */
        .hacker-img { width: 100%; border-radius: 15px; margin-top: 30px; display: block; }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- ሎጎ ከላይ -->
        <img src="logo.jpg" class="logo" alt="Logo">
        
        <h1>💻 Abe Tech 🇪🇹</h1>

        <!-- ጽሑፍ በሙሉ -->
        <div class="content">
            <h2>📢 ታላቅ የምስራች ከ Abe Tech!</h2>
            <p>ሰላም ቤተሰብ! የ Abe Tech ዌብሳይት ተከፍቷል! ከአሁን በኋላ ምርጥ የሞባይል ሶፍትዌሮችን እና የጥገና ፋይሎችን በዚህ ዌብሳይት ላይ በነፃ ያገኛሉ።</p>
            
            <h2>🛠️ የሶፍትዌር እና ሃርድዌር ስልጠና</h2>
            <p>• 🔓 FRP Remove & Format</p>
            <p>• 📲 Software Installation</p>
            <p>• 🌐 Remote Services</p>
        </div>

        <!-- ፎቶ ከታች ብቻ -->
        <img src="hacker.jpg" class="hacker-img" alt="Hacker">
    </div>
</body>
</html>
